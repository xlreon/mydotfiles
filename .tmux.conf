# =============================================================================
# .tmux.conf - Sidharth Satapathy (@xlreon)
# =============================================================================

# --- Plugin Manager (TPM) ----------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'         # better clipboard (y to copy)
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # Ctrl+h/j/k/l across vim+tmux

# --- Dracula theme config ----------------------------------------------------
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-military-time true
set -g @dracula-show-timezone false

# --- Session persistence -----------------------------------------------------
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# --- Prefix: Ctrl+Space ------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- True color ---------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- General -----------------------------------------------------------------
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g mouse on                 # mouse support (click to select pane/window)

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# --- Vi mode -----------------------------------------------------------------
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# --- Splits (same as original) -----------------------------------------------
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (Vim-style, works with vim-tmux-navigator) --------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize -------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Reload config -----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Activity monitoring -----------------------------------------------------
setw -g monitor-activity on
set -g visual-activity off

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
